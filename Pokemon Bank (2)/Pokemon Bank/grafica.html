<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Bank - Análisis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="body-app">
    <nav class="navbar navbar-dark mb-4 shadow">
        <span class="navbar-brand font-weight-bold">Pokémon Bank ATM</span>
        <span class="user-info">Análisis de Cuenta Mensual</span>
    </nav>

    <div class="container">
        <div class="chart-container shadow text-center" style="padding: 60px 20px; border: 3px solid #ffcb05;">
            
            <img src="img/pokebola-gris.png" alt="Cargando" style="width: 90px; opacity: 0.7; margin-bottom: 30px;">
            
            <h2 class="mb-4" style="color: #3b4cca; font-weight: bold;">Módulo de Análisis Estadístico</h2>
            
            <p class="text-muted lead px-4">
                El sistema está intentando sincronizar sus movimientos mensuales con el servidor central de <strong>El Salvador</strong>.
            </p>
            
            <div class="progress mt-5 shadow-sm" style="height: 35px; border-radius: 20px; max-width: 600px; margin: 0 auto;">
                <div class="progress-bar progress-bar-striped progress-bar-animated" 
                     role="progressbar" 
                     style="width: 85%; background-color: #3b4cca; color: white; font-weight: bold; font-size: 1.2rem;">
                     Sincronizando Datos... 85%
                </div>
            </div>
            
            <p class="mt-3 text-muted"><i>Esto puede tomar unos segundos...</i></p>

            <div class="mt-5 text-center">
                <a href="menu.html" class="btn btn-primary btn-lg px-5 shadow" style="font-weight:bold;">VOLVER AL MENÚ</a>
            </div>
        </div>
    </div>

    </body>
</html>
