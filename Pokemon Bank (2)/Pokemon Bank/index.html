<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Bank - Acceso Seguro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="body-inicio">
    <div class="contenedor-login">
        <img src="img/tema.png" alt="Logotipo" class="logo-superior">
        <div class="card card-login shadow-lg">
            <div class="card-body text-center">
                <h3 style="color: white; font-weight: bold; text-shadow: 1px 1px 3px #000;">Cajero Automático</h3>
                <form id="loginForm">
                    <input type="password" id="pinInput" class="form-control form-control-lg text-center mb-3" maxlength="4" placeholder="Ingrese su PIN" required>
                    <button type="button" onclick="validarAcceso()" class="btn btn-warning btn-block btn-lg" style="font-weight:bold; color:#3b4cca;">INGRESAR</button>
                </form>
            </div>
        </div>
    </div>

    <script>
    function validarAcceso() {
        const pin = document.getElementById('pinInput').value;

        // Validación simple de que puso algo
        if(pin.length === 4) {
            Swal.fire({
                title: '¡Acceso Concedido!',
                text: 'Bienvenido al sistema de El Salvador',
                icon: 'success',
                confirmButtonColor: '#3b4cca',
                confirmButtonText: 'Entrar al Menú'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = "menu.html";
                }
            });
        } else {
            Swal.fire({
                title: 'Error de PIN',
                text: 'Por favor ingrese los 4 dígitos de su clave.',
                icon: 'error',
                confirmButtonColor: '#cc0000'
            });
        }
    }
    </script>
</body>
</html>
